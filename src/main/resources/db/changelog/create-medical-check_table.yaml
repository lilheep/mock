databaseChangeLog:
  - changeSet:
      id: 2-create-medical-check-table
      author: lilheep
      changes:
        - createTable:
            tableName: medical_check
            schemaName: medical
            columns:
              - column:
                  name: id
                  type: bigserial
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: driver_id
                  type: bigint
                  constraints:
                    nullable: false

              - column:
                  name: doctor_id
                  type: bigint

              - column:
                  name: driver_start_time
                  type: timestamp
                  defaultValue: now()
                  constraints:
                    nullable: false

              - column:
                  name: driver_end_time
                  type: timestamp

              - column:
                  name: doctor_start_time
                  type: timestamp

              - column:
                  name: doctor_end_time
                  type: timestamp

              - column:
                  name: status
                  type: varchar(20)
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
