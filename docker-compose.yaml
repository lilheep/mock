volumes:
  db-data:
    driver: local
  pgadmin-data:
    driver: local


services:
  database:
    image: postgres:17.9
    container_name: postgres

    environment:
      POSTGRES_USER: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DATABASE}

    ports:
      - "5432:5432"

    volumes:
      - ./src/main/resources/db-init/initdb.sql:/docker-entrypoint-initdb.d/initdb.sql
      - db-data:/var/lib/postgresql/data

    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M

    healthcheck:
      test: ["CMD-SHELL", "pg-isready -U postgres -d medical_mock"]
      interval: 10s
      timeout: 10s
      retries: 5

    restart: unless-stopped

    networks:
      - pgnetwork

  pgadmin:
    container_name: pg_admin
    image: dpage/pgadmin4:9.13.0

    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"

    volumes:
      - pgadmin-data:/var/lib/pgadmin

    ports:
      - "5050:80"

    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M

    restart: unless-stopped

    networks:
      - pgnetwork

  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: mock

    ports:
      - "8080:8080"

    depends_on:
      - database

    env_file:
      - .env

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DATABASE}?currentSchema=${POSTGRES_SCHEMA}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.50'
          memory: 1G

    networks:
      - pgnetwork

networks:
  pgnetwork:
    driver: bridge